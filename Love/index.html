<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <title>❤️💖💕💍💍💍</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./imgs/icon.png" type="image/x-icon">
    <script>
        (() => {
            try {
                if (!localStorage.getItem('proposalConfigReady')) {
                    window.location.replace('./Config.html');
                }
            } catch (error) {
                console.warn('无法读取本地配置标记，将继续打开动画页。', error);
            }
        })();
    </script>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <button class="start-button">心动时刻</button>

    <div class="loading-container">
        <div class="loading-hearts">
            <span class="heart">♥</span>
            <span class="heart">♥</span>
            <span class="heart">♥</span>
        </div>
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
        <div class="loading-text">准备中... 0%</div>
        <div class="loading-subtext">资源加载中</div>
    </div>
    <script src="./js/bundle.js"></script>
</body>

</html>
