<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>🛩️ 飞机大战</title>
    <link rel="shortcut icon" href="images/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/index.css" />
</head>

<body>
    <div id="canvasBox" tabindex="-1">
        <!-- 首页 UI（游戏开始后统一隐藏） -->
        <div class="home-ui">
            <!-- 游戏标题 -->
            <div class="game-title">
                <span class="main">✈ 飞机大战</span>
                <span class="sub">🛡️ 消灭所有入侵者</span>
            </div>

            <!-- 开始按钮 -->
            <div class="startBtn" onclick="Main.gameStar()">开始游戏</div>
        </div>

        <!-- 操作提示 -->
        <div class="game-hint"><span>⌨ 方向键移动 &nbsp;·&nbsp; 📱 触摸拖动</span></div>

        <!-- 游戏结束弹窗 -->
        <div class="game-over-overlay" id="gameOverOverlay" style="display:none;">
            <div class="game-over-modal">
                <div class="game-over-icon">💥</div>
                <div class="game-over-title">游戏结束</div>
                <div class="game-over-score">
                    击杀敌机 <span id="finalKillCount">0</span> 架
                </div>
                <div class="game-over-btns">
                    <button class="go-btn go-btn-restart" onclick="Main.restartGame()">🔄 重新开始</button>
                    <button class="go-btn go-btn-exit" onclick="Main.exitToHome()">🏠 返回首页</button>
                </div>
            </div>
        </div>

        <canvas id="canvas"></canvas>
    </div>

    <script src="./js/Common.js"></script>
    <script src="./js/Controller.js"></script>
    <script src="./js/Timer.js"></script>
    <script src="./js/Explosion.js"></script>
    <script src="./js/Bullet.js"></script>
    <script src="./js/HpBar.js"></script>
    <script src="./js/Enemy.js"></script>
    <script src="./js/Plane.js"></script>
    <script src="./js/Main.js"></script>
</body>

</html>
